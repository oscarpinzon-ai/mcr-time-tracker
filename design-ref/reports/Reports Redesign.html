<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCR Reports · Redesign</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: Inter, system-ui, sans-serif; }
  .font-serif { font-family: 'Fraunces', Georgia, serif; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: oklch(0.85 0 0); border-radius: 5px; }
  *::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script src="lib.js"></script>
<script type="text/babel" data-presets="react" src="viz.jsx"></script>
<script type="text/babel" data-presets="react" src="drill.jsx"></script>
<script type="text/babel" data-presets="react" src="variation_a.jsx"></script>
<script type="text/babel" data-presets="react" src="variation_b.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "variation": "a",
  "vizType": "bars"
}/*EDITMODE-END*/;

function App() {
  const [variation, setVariation] = React.useState(TWEAKS.variation);
  const [vizType, setVizType] = React.useState(TWEAKS.vizType);
  const [filters, setFilters] = React.useState({ techs: [], jobTypes: [] });
  const [drillTech, setDrillTech] = React.useState(null);
  const [tick, setTick] = React.useState(0);
  const [editMode, setEditMode] = React.useState(false);

  // Auto-refresh every 30s (mock tick).
  React.useEffect(() => {
    const t = setInterval(() => setTick((x) => x + 1), 30000);
    return () => clearInterval(t);
  }, []);

  // Tweaks protocol.
  React.useEffect(() => {
    function onMsg(e) {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  function persist(edits) {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }

  const { TECHS, pauses, entries } = window.MCR_DATA;
  const byTech = window.MCR_LIB.aggregateByTech(
    window.MCR_LIB.applyFilters(entries, filters.techs, filters.jobTypes),
    pauses,
    TECHS,
  );

  // When drill tech id is set, resolve against current aggregation.
  const activeTech = drillTech
    ? byTech.find((t) => t.id === drillTech) || null
    : null;

  const Variation = variation === 'a' ? ShopFloor : Editorial;

  return (
    <>
      <Variation
        vizType={vizType}
        filters={filters}
        setFilters={setFilters}
        onDrillDown={(t) => setDrillTech(t.id)}
        tickSeconds={tick}
      />

      {activeTech && (
        <DrillDownPanel
          tech={activeTech}
          entries={window.MCR_LIB.applyFilters(entries, filters.techs, filters.jobTypes)}
          pauses={pauses}
          jobTypes={window.MCR_DATA.JOB_TYPES}
          mode={variation === 'a' ? 'mcr' : 'editorial'}
          onClose={() => setDrillTech(null)}
        />
      )}

      {editMode && (
        <TweaksPanel
          variation={variation}
          setVariation={(v) => { setVariation(v); persist({ variation: v }); }}
          vizType={vizType}
          setVizType={(v) => { setVizType(v); persist({ vizType: v }); }}
        />
      )}
    </>
  );
}

function TweaksPanel({ variation, setVariation, vizType, setVizType }) {
  return (
    <div
      className="fixed bottom-4 right-4 bg-white border-2 border-black shadow-2xl z-[60] w-64"
      style={{ fontFamily: 'Inter, system-ui, sans-serif' }}
    >
      <div className="bg-black text-white px-3 py-2 text-[11px] font-bold uppercase tracking-widest flex items-center justify-between">
        <span>Tweaks</span>
        <span className="text-yellow-400">●</span>
      </div>
      <div className="p-4 space-y-5">
        <div>
          <div className="text-[10px] uppercase tracking-wider font-bold text-neutral-500 mb-2">
            Variation
          </div>
          <div className="grid grid-cols-2 gap-1">
            {[
              { v: 'a', label: 'Shop Floor' },
              { v: 'b', label: 'Editorial' },
            ].map((o) => (
              <button
                key={o.v}
                onClick={() => setVariation(o.v)}
                className={
                  "px-2 py-2 text-[11px] font-bold uppercase tracking-wider border-2 transition-colors " +
                  (variation === o.v
                    ? "bg-black text-white border-black"
                    : "bg-white text-neutral-700 border-neutral-300 hover:border-black")
                }
              >
                {o.label}
              </button>
            ))}
          </div>
        </div>

        <div>
          <div className="text-[10px] uppercase tracking-wider font-bold text-neutral-500 mb-2">
            Utilization viz
          </div>
          <div className="grid grid-cols-3 gap-1">
            {[
              { v: 'bars', label: 'Bars' },
              { v: 'gauges', label: 'Gauges' },
              { v: 'heatmap', label: 'Heatmap' },
            ].map((o) => (
              <button
                key={o.v}
                onClick={() => setVizType(o.v)}
                className={
                  "px-2 py-2 text-[10px] font-bold uppercase tracking-wider border-2 transition-colors " +
                  (vizType === o.v
                    ? "bg-yellow-400 text-black border-black"
                    : "bg-white text-neutral-700 border-neutral-300 hover:border-black")
                }
              >
                {o.label}
              </button>
            ))}
          </div>
        </div>

        <div className="text-[9px] text-neutral-400 leading-relaxed pt-2 border-t border-neutral-200">
          Prototype for review · not production. Data is mocked from April 2026 month-to-date.
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
